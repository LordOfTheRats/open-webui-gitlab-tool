<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GitLab Agent</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" integrity="sha384-/+mi4JivT84X1Np9Jyu1+VxDRCcIh0b07XHJPjljJdwKeLlN0hdcWHkfFBtLe6fr" crossorigin="anonymous"></script>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 0; }
    header { padding: 16px 20px; background: #111827; border-bottom: 1px solid #1f2937; }
    main { max-width: 920px; margin: 0 auto; padding: 24px; display: grid; gap: 16px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 10px; padding: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input, textarea, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #1f2937; background: #0b1220; color: #e5e7eb; }
    textarea { min-height: 120px; resize: vertical; }
    .row { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
    button { padding: 10px 14px; background: #22d3ee; color: #0b1220; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
    button:hover { background: #2dd4bf; }
    .muted { color: #94a3b8; font-size: 14px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 12px; background: #1f2937; color: #cbd5e1; font-size: 12px; margin-right: 8px; }
    #result { white-space: pre-wrap; word-break: break-word; font-family: "SFMono-Regular", Menlo, Consolas, monospace; background: #0b1220; border-radius: 10px; padding: 12px; border: 1px solid #1f2937; }
    #spinner { display: none; color: #cbd5e1; }
    [hx-request][hx-trigger] #spinner { display: inline-block; }
  </style>
</head>
<body>
  <header>
    <div style="display:flex; align-items:center; gap:12px;">
      <div class="pill">GitLab Agent</div>
      <div class="muted">Model: {{ config.model }} · GitLab: {{ config.gitlab_url }}</div>
    </div>
  </header>
  <main>
    <div class="card">
      <form
        hx-post="/chat"
        hx-target="#result"
        hx-swap="innerHTML"
        hx-indicator="#spinner"
      >
        <label for="message">Request</label>
        <textarea id="message" name="message" placeholder="e.g., Triage the latest failed pipeline on main" required></textarea>

        <div class="row" style="margin-top:12px;">
          <div>
            <label for="model">Model</label>
            <input id="model" name="model" value="{{ config.model }}" />
            <div class="muted">Use openai:gpt-4o or ollama:llama3</div>
          </div>
          <div>
            <label for="ollama_base_url">Ollama Base URL</label>
            <input id="ollama_base_url" name="ollama_base_url" value="{{ config.ollama_base_url }}" />
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div>
            <label for="gitlab_url">GitLab URL</label>
            <input id="gitlab_url" name="gitlab_url" value="{{ config.gitlab_url }}" />
          </div>
          <div>
            <label for="gitlab_token">GitLab Token (override)</label>
            <input id="gitlab_token" name="gitlab_token" type="password" placeholder="Leave blank to use server env" />
          </div>
        </div>

        <div class="row" style="margin-top:12px;">
          <div>
            <label for="allow_writes">Allow repository writes?</label>
            <select id="allow_writes" name="allow_writes">
              <option value="false" {% if not config.allow_writes %}selected{% endif %}>No (default)</option>
              <option value="true" {% if config.allow_writes %}selected{% endif %}>Yes</option>
            </select>
            <div class="muted">Keep disabled unless you intend to change files.</div>
          </div>
          <div>
            <label for="verify_ssl">Verify SSL</label>
            <select id="verify_ssl" name="verify_ssl">
              <option value="true" {% if config.verify_ssl %}selected{% endif %}>Verify certificates</option>
              <option value="false" {% if not config.verify_ssl %}selected{% endif %}>Skip verification</option>
            </select>
          </div>
        </div>

        <button type="submit" style="margin-top:14px;">Run Agent</button>
        <span id="spinner" aria-live="polite">Running...</span>
      </form>
    </div>

    <div class="card">
      <div class="pill">Result</div>
      <div id="result" class="muted">Results appear here.</div>
    </div>
  </main>
</body>
</html>
