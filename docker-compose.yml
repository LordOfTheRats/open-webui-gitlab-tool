version: '3.8'

services:
  gitlab-agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_URL: ${GITLAB_URL:-https://gitlab.example.com}
      GITLAB_AGENT_MODEL: ${GITLAB_AGENT_MODEL:-ollama:gpt-4o}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      GITLAB_VERIFY_SSL: ${GITLAB_VERIFY_SSL:-true}
      GITLAB_ALLOW_WRITES: ${GITLAB_ALLOW_WRITES:-false}
      GITLAB_COMPACT_RESULTS: ${GITLAB_COMPACT_RESULTS:-true}
    depends_on:
      - ollama
    networks:
      - gitlab-agent-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - gitlab-agent-network
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    command: serve

volumes:
  ollama-data:

networks:
  gitlab-agent-network:
    driver: bridge
